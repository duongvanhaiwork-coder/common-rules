name: Pack Validation

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate pack files
        run: |
          chmod +x ./scripts/validate-pack.sh
          ./scripts/validate-pack.sh
